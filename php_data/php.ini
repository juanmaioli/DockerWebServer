; 🐘 Configuración PHP optimizada para WebServer Docker
; Permite subir archivos y carpetas pesadas

upload_max_filesize = 100M
post_max_size = 105M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
display_errors = On
error_reporting = E_ALL
date.timezone = "America/Argentina/Buenos_Aires"
