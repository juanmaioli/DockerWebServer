services:
  webserver_mariadb:
    # Versión LTS de MariaDB para mayor estabilidad y soporte a largo plazo
    image: mariadb:10.11
    container_name: webserver_mariadb
    command: '--default-authentication-plugin=mysql_native_password'
    volumes:
      - ./db_data:/var/lib/mysql
    restart: ${RESTART_POLICY}
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MYSQL_DATABASE}
      - MARIADB_USER=${MYSQL_USER}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    ports:
      - "3306:3306"
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-126}
    container_name: webserver
    restart: ${RESTART_POLICY}
    depends_on:
      webserver_mariadb:
        condition: service_healthy
    volumes:
      - ./www_data:/var/www/html
      - ./apache_data/sites-available:/etc/apache2/sites-available
      - ./apache_data/conf-available:/etc/apache2/conf-available
      - ./apache_data/mods-available:/etc/apache2/mods-available
      - ./apache_data/ssl:/etc/apache2/ssl
      - ./apache_data/ports.conf:/etc/apache2/ports.conf
      - ./apache_data/apache2.conf:/etc/apache2/apache2.conf
      - ./php_data/php.ini:/usr/local/etc/php/php.ini
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DB_SERVER=webserver_mariadb
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_PORT=3306
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASS=${DASHBOARD_PASS}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    ports:
      # - "5080:80"
      - "5443:443"

  webserver_phpmyadmin:
    image: phpmyadmin:latest
    container_name: webserver_phpmyadmin
    restart: ${RESTART_POLICY}
    environment:
      - PMA_HOST=webserver_mariadb
      - PMA_ARBITRARY=1
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 256M
    ports:
      - 5088:80

