<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Generador de Formularios">
    <meta name="author" content="Juan Maioli">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Form Generator from DB</title>
    <script>
        // Función para actualizar el tema según la preferencia del sistema
        const updateTheme = () => {
            const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        };
        
        // Detectar cambio inicial y escuchar cambios futuros
        updateTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTheme);
    </script>
    <link rel="apple-touch-icon" sizes="57x57" href="images/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="images/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="images/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="images/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="images/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="images/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="images/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="images/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
</head>

<body>

  <div class="container">

    <div class="row mt-5">

      <div class="col-md-12">

        <div class="card shadow-sm border-0">

          <div class="card-header bg-primary text-white text-center py-3">

            <h3 id="title" class="mb-0">🔌 Conectar a Servidor MySQL</h3>

          </div>

          <div class="card-body p-4">

            <form method="post" name="formularioConexion" id="formularioConexion">

              <div class="row g-3 align-items-end">

                <div class="col-md-3">

                  <label class="form-label small fw-bold">🌐 Servidor</label>

                  <input type="hidden" name="cmd" id="cmd" value="conn">

                  <input type="text" class="form-control" id="db_server" name="db_server" value="localhost" placeholder="Ej: localhost">

                </div>

                <div class="col-md-2">

                  <label class="form-label small fw-bold">👤 Usuario</label>

                  <input type="text" class="form-control" id="db_user" name="db_user" value="root" placeholder="Usuario">

                </div>

                <div class="col-md-2">

                  <label class="form-label small fw-bold">🔑 Contraseña</label>

                  <input type="password" class="form-control" id="db_pass" name="db_pass" value="" placeholder="Contraseña" onblur="getDatabases()">

                </div>

                <div class="col-md-2">

                  <label class="form-label small fw-bold">🗄️ Base de Datos</label>

                  <select class="form-select" id="db_name" name="db_name">

                    <option value="">Seleccionar DB</option>

                  </select>

                </div>

                <div class="col-md-2">

                  <label class="form-label small fw-bold">🔢 Puerto</label>

                  <input type="number" class="form-control" id="db_serverport" name="db_serverport" value="3306">

                </div>

                <div class="col-md-1">

                  <button type="button" class="btn btn-primary w-100 shadow-sm" onclick="enviaForm('formularioConexion')">🚀</button>

                </div>

            </div>

            </form>

          </div>

        </div>

      </div>

    </div>
    <div class="row mt-4">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <div id="respuesta"></div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="api.js"></script>
    <script type="text/javascript" src="form_gen.js"></script>
</body>

</html>
