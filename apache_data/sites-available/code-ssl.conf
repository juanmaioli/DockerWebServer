<VirtualHost *:443>
    ServerName code.webserver.docker
    ServerAlias code.webserver.docker

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/webserver.crt
    SSLCertificateKeyFile /etc/apache2/ssl/webserver.key

    # Soporte para WebSockets (VRE para VSCode)
    ProxyPassMatch ^/(.*)/websocket ws://openvscode:3000/$1/websocket
    
    # Proxy a openvscode (nombre del servicio en compose.yml)
    ProxyPass / http://openvscode:3000/
    ProxyPassReverse / http://openvscode:3000/

    ErrorLog ${APACHE_LOG_DIR}/code_error.log
    CustomLog ${APACHE_LOG_DIR}/code_access.log combined
</VirtualHost>
