<VirtualHost *:443>
    ServerName pma.webserver.docker
    ServerAlias pma.webserver.docker

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/webserver.crt
    SSLCertificateKeyFile /etc/apache2/ssl/webserver.key

    # Proxy a phpmyadmin (nombre del servicio en compose.yml)
    ProxyPass / http://phpmyadmin:80/
    ProxyPassReverse / http://phpmyadmin:80/

    ErrorLog ${APACHE_LOG_DIR}/pma_error.log
    CustomLog ${APACHE_LOG_DIR}/pma_access.log combined
</VirtualHost>
